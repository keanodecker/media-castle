<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>GSAP morphSVG curve manipulation.</title>
    <link rel='stylesheet' href='https://codepen.io/GreenSock/pen/xxmzBrw.css'><link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <p class="fixed braces">click me</p>
<div class='wrapper'>
  <svg class="transition" viewBox="0 0 100 100" preserveAspectRatio="xMidYMin slice">
    <defs>
      <linearGradient id="grad" x1="0" y1="0" x2="99" y2="99" gradientUnits="userSpaceOnUse">
         <stop offset="0.2" stop-color="rgb(255, 135, 9)" />
          <stop offset="0.7" stop-color="rgb(247, 189, 248)" />
      </linearGradient>
    </defs>
    <path class="path" stroke="url(#grad)" fill="url(#grad)" stroke-width="2px" vector-effect="non-scaling-stroke" d="M 0 100 V 100 Q 50 100 100 100 V 100 z" />
  </svg>
</div>
    <script src='https://unpkg.com/gsap@3/dist/gsap.min.js'></script>
<script src='https://unpkg.com/gsap@3/dist/MorphSVGPlugin.min.js'></script><script  src="./script.js"></script>

  </body>
  
</html>
